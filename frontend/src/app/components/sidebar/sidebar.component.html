@if (auth.isAuthenticated()) {
<nav class="sidebar">

  <!-- Logo OutilTech -->
  <div class="sidebar-logo">
    <a routerLink="/home" class="sidebar-brand-link" style="text-decoration: none;">
      <svg viewBox="0 0 260 52" width="160" height="32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sgOg" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#CE93D8"/>
            <stop offset="40%" stop-color="#7B2FBE"/>
            <stop offset="100%" stop-color="#1A0030"/>
          </radialGradient>
          <linearGradient id="sgTg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="50%" stop-color="#90CAF9"/>
            <stop offset="100%" stop-color="#00E5FF"/>
          </linearGradient>
        </defs>
        <circle cx="22" cy="26" r="20" fill="url(#sgOg)"/>
        <circle cx="22" cy="26" r="20" fill="none" stroke="#7B2FBE" stroke-width="0.8" opacity="0.5"/>
        <g stroke="#00E5FF" stroke-width="0.7" fill="none" opacity="0.85">
          <line x1="22" y1="6" x2="22" y2="14"/>
          <line x1="14" y1="14" x2="30" y2="14"/>
          <line x1="8" y1="26" x2="14" y2="26"/>
          <line x1="30" y1="26" x2="36" y2="26"/>
          <line x1="14" y1="38" x2="30" y2="38"/>
          <line x1="22" y1="38" x2="22" y2="46"/>
          <line x1="14" y1="14" x2="10" y2="20"/>
          <line x1="30" y1="14" x2="34" y2="20"/>
          <line x1="10" y1="20" x2="10" y2="32"/>
          <line x1="34" y1="20" x2="34" y2="32"/>
          <line x1="10" y1="32" x2="14" y2="38"/>
          <line x1="34" y1="32" x2="30" y2="38"/>
        </g>
        <g fill="#00E5FF">
          <circle cx="22" cy="6" r="1.5"/>
          <circle cx="14" cy="14" r="1.2"/>
          <circle cx="30" cy="14" r="1.2"/>
          <circle cx="8" cy="26" r="1.2"/>
          <circle cx="36" cy="26" r="1.2"/>
          <circle cx="14" cy="38" r="1.2"/>
          <circle cx="30" cy="38" r="1.2"/>
          <circle cx="22" cy="46" r="1.5"/>
        </g>
        <circle cx="22" cy="26" r="6" fill="#0D001A" stroke="#CE93D8" stroke-width="1"/>
        <circle cx="22" cy="26" r="3.5" fill="#7B2FBE"/>
        <line x1="36" y1="14" x2="44" y2="8" stroke="#00E5FF" stroke-width="1"/>
        <polygon points="45,5 48,11 41,12" fill="#00E5FF"/>
        <text x="48" y="32" font-family="Arial Black, sans-serif" font-weight="900" font-size="18" fill="url(#sgTg)" letter-spacing="-0.5">utilTech</text>
        <text x="48" y="44" font-family="Arial, sans-serif" font-size="7" fill="white" letter-spacing="1" opacity="0.6">Sistema de Gestión</text>
      </svg>
    </a>
  </div>

  <!-- Info usuario -->
  <div class="sidebar-user">
    <div class="user-avatar">{{ auth.currentUser()?.name?.charAt(0)?.toUpperCase() ?? 'U' }}</div>
    <div class="user-details">
      <p class="user-name">{{ auth.currentUser()?.name }}</p>
      <span class="role-badge role-{{ auth.role()?.toLowerCase() }}">{{ auth.role() }}</span>
    </div>
  </div>

  <!-- Menú -->
  <ul class="sidebar-menu">
    @for (item of menuItems; track item.label) {
      <li>
        <a [routerLink]="item.link" class="sidebar-link" routerLinkActive="active">
          <span class="link-icon">{{ item.icon }}</span>
          <span class="link-label">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>

  <!-- AppSheet (solo Admin) -->
  @if (auth.isAdmin()) {
    <div class="sidebar-appsheet">
      <a href="https://www.appsheet.com/Template/AppDef?appName=ProductosApp-77437126&utm_source=share_app_link#Data.Columns.Clientes"
         target="_blank" rel="noopener noreferrer" class="btn-appsheet">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.7"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.7"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
        </svg>
        <span>AppSheet</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" class="ext-icon">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <polyline points="15,3 21,3 21,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
  }

  <!-- Logout -->
  <button class="logout-btn" (click)="logout()">
    <span>⏻</span> Cerrar sesión
  </button>

</nav>
}

<nav class="sidebar" *ngIf="auth.isAuthenticated()">
  <div class="user-info">
    <p>Bienvenido, {{ auth.role() }}</p>
  </div>
  <ul>
    <li><a routerLink="/dashboard">Inicio (Signals)</a></li>
    <li *ngIf="auth.role() === 'admin'"><a routerLink="/admin">Admin (Roles)</a></li>
    <li><button (click)="auth.logout()">Cerrar sesión</button></li>
  </ul>
</nav>

<div class="cart-overlay" *ngIf="cartService.isOpen()" (click)="cartService.cerrarCarrito()"></div>

<div class="cart-panel" [class.open]="cartService.isOpen()">
  <div class="cart-header">
    <h3>🛒 Productos en tu carrito</h3>
    <button class="cart-close" (click)="cartService.cerrarCarrito()">✕</button>
  </div>

  <div class="cart-empty" *ngIf="cartService.items().length === 0">
    <p>Tu carrito está vacío</p>
    <a routerLink="/home" (click)="cartService.cerrarCarrito()">Ver productos</a>
  </div>

  <div class="cart-items" *ngIf="cartService.items().length > 0">
    <div class="cart-item" *ngFor="let item of cartService.items(); let i = index">
      <img [src]="item.producto.imagen" [alt]="item.producto.nombre" class="cart-item-img"/>
      <div class="cart-item-info">
        <p class="cart-item-nombre">{{item.producto.nombre}}</p>
        <p class="cart-item-variante" *ngIf="item.variante">{{item.variante.storage || item.variante.color}}</p>
        <div class="cart-item-qty">
          <button (click)="cartService.actualizarCantidad(i, item.cantidad - 1)">−</button>
          <span>{{item.cantidad}}</span>
          <button (click)="cartService.actualizarCantidad(i, item.cantidad + 1)">+</button>
        </div>
      </div>
      <div class="cart-item-right">
        <p class="cart-item-precio">{{formatPrecio(item.subtotal)}}</p>
        <button class="cart-item-del" (click)="cartService.eliminarItem(i)">🗑️</button>
      </div>
    </div>
  </div>

  <div class="cart-footer" *ngIf="cartService.items().length > 0">
    <div class="cart-subtotal">
      <span>Subtotal</span>
      <strong>{{formatPrecio(cartService.subtotal())}}</strong>
    </div>
    <a routerLink="/carrito" class="cart-btn-ver" (click)="cartService.cerrarCarrito()">Ver carrito</a>
    <a routerLink="/checkout" class="cart-btn-checkout" (click)="cartService.cerrarCarrito()">Finalizar pedido</a>
    <button class="cart-btn-seguir" (click)="cartService.cerrarCarrito()">← Seguir comprando</button>
  </div>
</div>

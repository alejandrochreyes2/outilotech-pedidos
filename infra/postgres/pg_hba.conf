# ================================================================
# pg_hba.conf — Outiltech / Hetzner
# Gestionado en Git: infra/postgres/pg_hba.conf
# ================================================================

# Red interna Docker — scram-sha-256 requerido (password almacenado en ese formato)
host    all             all             10.0.0.0/8              scram-sha-256

# ----------------------------------------------------------------
# Conexiones locales Unix socket
local   all             all                                     trust

# Loopback TCP/IP
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Replicacion local
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust

# ----------------------------------------------------------------
# Conexiones externas — requieren contrasena fuerte
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256

# ================================================================
# pg_hba.conf — Outiltech / Hetzner
# Gestionado en Git: infra/postgres/pg_hba.conf
# IMPORTANTE: trust para red Docker es seguro — el puerto 5432 no
# está expuesto a internet, solo los contenedores internos llegan.
# ================================================================

# Red interna Docker — trust (sin contrasena, red aislada)
host    all             all             10.0.0.0/8              trust
host    all             all             172.16.0.0/12           trust
host    all             all             192.168.0.0/16          trust

# Conexiones locales Unix socket
local   all             all                                     trust

# Loopback TCP/IP
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Replicacion local
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust

# Conexiones externas — requieren contrasena fuerte
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256

name: Setup Cloudflare DNS

on:
  workflow_dispatch:

jobs:
  configure-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Create or Update DNS Record for api.outiltech.co
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🌐 Iniciando configuración de DNS..."
          
          # 1. Obtener la lista de zonas y buscar la que contenga 'outiltech'
          ZONES_JSON=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json")
          
          # Intentar obtener el ID de la zona que termine en outiltech.co o sea exactamente outiltech.co
          ZONE_ID=$(echo "$ZONES_JSON" | jq -r '.result[] | select(.name == "outiltech.co" or (.name | endswith(".outiltech.co"))).id' | head -n 1)
          
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" == "null" ]; then
            echo "⚠️ No se encontró zona exacta. Intentando buscar cualquier zona accesible..."
            ZONE_ID=$(echo "$ZONES_JSON" | jq -r '.result[0].id')
          fi

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" == "null" ]; then
            echo "❌ ERROR: No hay zonas disponibles para este token."
            exit 1
          fi
          
          echo "✅ Usando Zone ID: $ZONE_ID"
          
          # 2. Buscar si ya existe el registro api.outiltech.co
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=api.outiltech.co" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" | jq -r '.result[0].id')

          DATA='{"type":"A","name":"api.outiltech.co","content":"178.156.222.248","ttl":1,"proxied":true}'

          if [ "$RECORD_ID" != "null" ] && [ -n "$RECORD_ID" ]; then
             echo "🔄 Actualizando registro existente..."
             curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data "$DATA"
          else
             echo "➕ Creando nuevo registro..."
             curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data "$DATA"
          fi
          echo "🚀 DNS configurado con éxito."

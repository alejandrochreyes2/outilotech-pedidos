name: Setup Cloudflare DNS

on:
  workflow_dispatch:

jobs:
  configure-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Create or Update DNS Record for api.outiltech.co
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # 1. Obtener el Zone ID de outiltech.co
          ZONES_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          
          ZONE_ID=$(echo "$ZONES_RESPONSE" | jq -r '.result[] | select(.name=="outiltech.co").id')
          
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" == "null" ]; then
             echo "Zone no encontrada con el filtro exacto. Tomando la primera zona disponible del token..."
             ZONE_ID=$(echo "$ZONES_RESPONSE" | jq -r '.result[0].id')
          fi

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" == "null" ]; then
            echo "Error crítico: El token Cloudflare de Github no tiene permisos de lectura de Zonas (result:[])."
            exit 1
          fi
          
          echo "ZONE_ID=$ZONE_ID"
          
          # 2. Crear el registro DNS A
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=api.outiltech.co&type=A" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" | jq -r '.result[0].id')

          DATA='{"type":"A","name":"api.outiltech.co","content":"178.156.222.248","ttl":1,"proxied":true}'

          if [ "$RECORD_ID" != "null" ] && [ -n "$RECORD_ID" ]; then
             curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data "$DATA"
          else
             curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data "$DATA"
          fi

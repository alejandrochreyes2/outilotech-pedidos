name: Upload Heavy Assets to R2

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/src/assets/videos/**'
  workflow_dispatch:

jobs:
  sync-to-r2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = public-read
          EOF

      - name: Sync videos to R2 bucket
        run: |
          rclone sync frontend/src/assets/videos/ r2:outiltech-videos/videos/ \
            --progress --verbose --checksum

      - name: Verify public URL
        run: |
          PUBLIC_URL="https://pub-a0b7016e047745bb9b903fba581c7a59.r2.dev"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PUBLIC_URL}/videos/hero-tech.mp4" --max-time 10)
          echo "Video URL status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Video accesible en ${PUBLIC_URL}/videos/hero-tech.mp4"
          else
            echo "⚠️ Video no accesible (status $STATUS)"
          fi

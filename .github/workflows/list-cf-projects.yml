name: List Cloudflare Pages Projects

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: List all CF Pages projects
        run: |
          curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print('success:', data.get('success'))
          for p in data.get('result', []):
              print('PROJECT:', p.get('name'), '|', p.get('subdomain'))
          "

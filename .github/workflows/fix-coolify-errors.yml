name: Fix Coolify Real-time & WebSocket Errors (Permanent)
on:
  push:
    branches: [ main ]
    paths:
      - 'config/coolify/docker-compose.custom.yml'
      - '.github/workflows/fix-coolify-errors.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # Opcional: cada 6 horas

jobs:
  sync-soketi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 178.156.222.248 >> ~/.ssh/known_hosts
      - name: Test SSH connection
        run: ssh -o StrictHostKeyChecking=accept-new root@178.156.222.248 "echo 'SSH OK'"
      - name: Copy config file to server and restart if needed
        run: |
          scp config/coolify/docker-compose.custom.yml root@178.156.222.248:/tmp/docker-compose.custom.yml
          ssh root@178.156.222.248 << 'EOF'
            LOCAL_CONFIG="/data/coolify/source/docker-compose.custom.yml"
            if ! cmp -s /tmp/docker-compose.custom.yml "$LOCAL_CONFIG"; then
              echo "Configuración de Soketi desactualizada. Actualizando..."
              cp /tmp/docker-compose.custom.yml "$LOCAL_CONFIG"
              cd /data/coolify/source
              docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.custom.yml down
              docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.custom.yml up -d
              echo "Servicios reiniciados correctamente."
            else
              echo "Configuración ya está actualizada."
            fi
            rm -f /tmp/docker-compose.custom.yml
          EOF
      - name: Verify soketi is running
        run: |
          ssh root@178.156.222.248 "docker ps --filter name=coolify-realtime --format '{{.Status}}' | grep -q Up"

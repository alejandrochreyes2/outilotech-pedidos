name: Deploy Portafolio React to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'portafolio/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy React Portafolio to Cloudflare Pages
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portafolio/package-lock.json

      - name: Install dependencies
        working-directory: portafolio
        run: npm ci

      - name: Build React portafolio
        working-directory: portafolio
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: outiltech-portafolio
          directory: portafolio/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

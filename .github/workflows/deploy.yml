name: CD — Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Servicio a desplegar (all/pedidos/usuarios/pagos/gateway/frontend)'
        required: false
        default: 'all'

env:
  SERVER: 178.156.222.248
  REPO_DIR: /tmp/outiltech-repo
  COMPOSE_DIR: /data/coolify/applications/g12weuw6n4h1cag21oo53sd1
  APP_PREFIX: g12weuw6n4h1cag21oo53sd1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Detectar qué servicios cambiaron ────────────────────────
      - name: Detectar servicios modificados
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED"

          pedidos=false
          usuarios=false
          pagos=false
          gateway=false
          frontend=false
          infra=false

          echo "$CHANGED" | grep -q '^backend/pedidos/'   && pedidos=true
          echo "$CHANGED" | grep -q '^backend/usuarios/'  && usuarios=true
          echo "$CHANGED" | grep -q '^backend/pagos/'     && pagos=true
          echo "$CHANGED" | grep -q '^backend/ApiGateway/'&& gateway=true
          echo "$CHANGED" | grep -q '^frontend/'          && frontend=true
          echo "$CHANGED" | grep -q '^infra/'             && infra=true

          echo "pedidos=$pedidos"   >> $GITHUB_OUTPUT
          echo "usuarios=$usuarios" >> $GITHUB_OUTPUT
          echo "pagos=$pagos"       >> $GITHUB_OUTPUT
          echo "gateway=$gateway"   >> $GITHUB_OUTPUT
          echo "frontend=$frontend" >> $GITHUB_OUTPUT
          echo "infra=$infra"       >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── Desplegar en servidor via SSH ───────────────────────────
      - name: Deploy al servidor
        uses: appleboy/ssh-action@v1.2.0
        env:
          COMMIT:          ${{ steps.changes.outputs.commit }}
          BUILD_PEDIDOS:   ${{ steps.changes.outputs.pedidos }}
          BUILD_USUARIOS:  ${{ steps.changes.outputs.usuarios }}
          BUILD_PAGOS:     ${{ steps.changes.outputs.pagos }}
          BUILD_GATEWAY:   ${{ steps.changes.outputs.gateway }}
          BUILD_FRONTEND:  ${{ steps.changes.outputs.frontend }}
          APPLY_INFRA:     ${{ steps.changes.outputs.infra }}
          GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASSWORD }}
          PG_PASS:         ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host:    ${{ env.SERVER }}
          username: root
          key:     ${{ secrets.SSH_DEPLOY_KEY }}
          envs:    COMMIT,BUILD_PEDIDOS,BUILD_USUARIOS,BUILD_PAGOS,BUILD_GATEWAY,BUILD_FRONTEND,APPLY_INFRA,GMAIL_APP_PASS,PG_PASS
          command_timeout: 18m
          script: |
            set -e
            REPO_DIR=/tmp/outiltech-repo
            COMPOSE_DIR=/data/coolify/applications/g12weuw6n4h1cag21oo53sd1
            PREFIX=g12weuw6n4h1cag21oo53sd1

            # ── Credenciales email y DB (se aplica siempre al .env) ─
            if [ -n "$GMAIL_APP_PASS" ]; then
              sed -i "s|Email__User=.*|Email__User=jhonatanhtech@gmail.com|" $COMPOSE_DIR/.env
              sed -i "s|Email__Password=.*|Email__Password=${GMAIL_APP_PASS}|" $COMPOSE_DIR/.env
              echo "✓ Email credentials configured"
            fi
            if [ -n "$PG_PASS" ]; then
              sed -i "s|POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${PG_PASS}|" $COMPOSE_DIR/.env
              sed -i "s|Password=[^;]*|Password=${PG_PASS}|g" $COMPOSE_DIR/.env
              echo "✓ DB password configured"
            fi

            # ── Clonar o actualizar código ────────────────────────
            if [ -d "$REPO_DIR/.git" ]; then
              cd $REPO_DIR && git fetch origin && git reset --hard origin/main
            else
              git clone https://github.com/alejandrochreyes2/outilotech-pedidos.git $REPO_DIR
              cd $REPO_DIR
            fi
            echo "✓ Código actualizado al commit $COMMIT"

            # ── Aplicar pg_hba.conf en CADA deploy (trust para red Docker interna) ──
            # Con trust, las conexiones desde contenedores Docker no necesitan contraseña.
            # Esto elimina PERMANENTEMENTE los fallos de auth tras reiniciar el servidor.
            echo "→ Aplicando infra/postgres/pg_hba.conf..."
            PG_CONTAINER=$(docker ps --filter "name=${PREFIX}" --format "{{.Names}}" | grep -i postgres | head -1)
            if [ -n "$PG_CONTAINER" ]; then
              docker cp $REPO_DIR/infra/postgres/pg_hba.conf $PG_CONTAINER:/var/lib/postgresql/data/pg_hba.conf
              docker exec $PG_CONTAINER psql -U postgres -d postgres -c "SELECT pg_reload_conf();" > /dev/null 2>&1 || true
              echo "✓ pg_hba.conf recargado (trust para Docker 10.x/172.x/192.168.x)"

              # Garantizar que toyota_user existe (app lo usa como usuario de BD)
              docker exec $PG_CONTAINER psql -U postgres -d postgres -c "
                DO \$\$ BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='toyota_user') THEN
                    CREATE USER toyota_user WITH SUPERUSER;
                    RAISE NOTICE 'toyota_user creado';
                  END IF;
                END \$\$;
              " > /dev/null 2>&1 || true

              # Garantizar que la base de datos outiltech_db existe
              docker exec $PG_CONTAINER psql -U postgres -d postgres -c "
                SELECT 'CREATE DATABASE outiltech_db OWNER toyota_user'
                WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='outiltech_db')
              " | grep -q 'CREATE DATABASE' && \
              docker exec $PG_CONTAINER psql -U postgres -d postgres -c \
                "CREATE DATABASE outiltech_db OWNER toyota_user" > /dev/null 2>&1 || true

              echo "✓ Usuarios y base de datos de postgres verificados"
            else
              echo "⚠ Contenedor postgres no encontrado — pg_hba.conf se aplicará en próximo deploy"
            fi

            # ── Función helper para build + restart ───────────────
            deploy_service() {
              SERVICE=$1
              BUILD_CONTEXT=$2
              IMAGE="${PREFIX}_${SERVICE}:${COMMIT}"

              echo "→ Construyendo ${SERVICE}..."
              docker build -t $IMAGE $REPO_DIR/$BUILD_CONTEXT

              # Actualizar tag en docker-compose.yaml
              OLD_TAG=$(grep "image:.*${PREFIX}_${SERVICE}:" $COMPOSE_DIR/docker-compose.yaml | grep -o "${SERVICE}:[a-f0-9]*" | head -1)
              sed -i "s|${PREFIX}_${SERVICE}:[a-f0-9]*|${PREFIX}_${SERVICE}:${COMMIT}|g" $COMPOSE_DIR/docker-compose.yaml

              echo "→ Reiniciando ${SERVICE}..."
              cd $COMPOSE_DIR && docker compose up -d --no-deps $SERVICE
              echo "✓ ${SERVICE} desplegado ($IMAGE)"
            }

            # ── Construir y desplegar servicios modificados ───────
            cd $COMPOSE_DIR

            if [ "$BUILD_PEDIDOS" = "true" ]; then
              deploy_service "pedidos" "backend/pedidos"
            fi

            if [ "$BUILD_USUARIOS" = "true" ]; then
              deploy_service "usuarios" "backend/usuarios"
            fi

            if [ "$BUILD_PAGOS" = "true" ]; then
              deploy_service "pagos" "backend/pagos"
            fi

            if [ "$BUILD_GATEWAY" = "true" ]; then
              deploy_service "apigateway" "backend/ApiGateway"
            fi

            if [ "$BUILD_FRONTEND" = "true" ]; then
              echo "→ Construyendo frontend Angular..."
              docker build -t ${PREFIX}_frontend:${COMMIT} $REPO_DIR/frontend
              OLD=$(grep "image:.*${PREFIX}_frontend:" docker-compose.yaml | grep -o "frontend:[a-f0-9]*" | head -1)
              sed -i "s|${PREFIX}_frontend:[a-f0-9]*|${PREFIX}_frontend:${COMMIT}|g" docker-compose.yaml
              docker compose up -d --no-deps frontend
              echo "✓ Frontend desplegado"
            fi

            # ── Limpiar imágenes antiguas (guardar últimas 3) ─────
            for SVC in pedidos usuarios pagos apigateway frontend; do
              docker images "${PREFIX}_${SVC}" --format "{{.ID}} {{.Tag}}" \
                | sort -k2 -r | tail -n +4 \
                | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true
            done

            echo ""
            echo "════════════════════════════════════════"
            echo " Deploy completado — commit: $COMMIT"
            echo " $(date)"
            echo "════════════════════════════════════════"

      # ── Verificar salud del sistema ─────────────────────────────
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            https://api.outiltech.co/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"jhonatanhtech@gmail.com","password":"Admin1327"}' \
            --max-time 15)
          echo "HTTP status login: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check falló (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Sistema operativo — login OK"

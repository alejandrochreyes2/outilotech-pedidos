name: CD вЂ” Deploy to Hetzner

on:
  push:
    branches: [main]

env:
  SERVER: 178.156.222.248
  REPO_DIR: /tmp/outiltech-repo
  COMPOSE_DIR: /data/coolify/applications/g12weuw6n4h1cag21oo53sd1
  APP_PREFIX: g12weuw6n4h1cag21oo53sd1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout cГіdigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # в”Ђв”Ђ Detectar quГ© servicios cambiaron в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Detectar servicios modificados
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED"

          pedidos=false
          usuarios=false
          pagos=false
          gateway=false
          frontend=false
          infra=false

          echo "$CHANGED" | grep -q '^backend/pedidos/'   && pedidos=true
          echo "$CHANGED" | grep -q '^backend/usuarios/'  && usuarios=true
          echo "$CHANGED" | grep -q '^backend/pagos/'     && pagos=true
          echo "$CHANGED" | grep -q '^backend/ApiGateway/'&& gateway=true
          echo "$CHANGED" | grep -q '^frontend/'          && frontend=true
          echo "$CHANGED" | grep -q '^infra/'             && infra=true

          echo "pedidos=$pedidos"   >> $GITHUB_OUTPUT
          echo "usuarios=$usuarios" >> $GITHUB_OUTPUT
          echo "pagos=$pagos"       >> $GITHUB_OUTPUT
          echo "gateway=$gateway"   >> $GITHUB_OUTPUT
          echo "frontend=$frontend" >> $GITHUB_OUTPUT
          echo "infra=$infra"       >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # в”Ђв”Ђ Desplegar en servidor via SSH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Deploy al servidor
        uses: appleboy/ssh-action@v1.2.0
        env:
          COMMIT:          ${{ steps.changes.outputs.commit }}
          BUILD_PEDIDOS:   ${{ steps.changes.outputs.pedidos }}
          BUILD_USUARIOS:  ${{ steps.changes.outputs.usuarios }}
          BUILD_PAGOS:     ${{ steps.changes.outputs.pagos }}
          BUILD_GATEWAY:   ${{ steps.changes.outputs.gateway }}
          BUILD_FRONTEND:  ${{ steps.changes.outputs.frontend }}
          APPLY_INFRA:     ${{ steps.changes.outputs.infra }}
        with:
          host:    ${{ env.SERVER }}
          username: root
          key:     ${{ secrets.SSH_DEPLOY_KEY }}
          envs:    COMMIT,BUILD_PEDIDOS,BUILD_USUARIOS,BUILD_PAGOS,BUILD_GATEWAY,BUILD_FRONTEND,APPLY_INFRA
          command_timeout: 18m
          script: |
            set -e
            REPO_DIR=/tmp/outiltech-repo
            COMPOSE_DIR=/data/coolify/applications/g12weuw6n4h1cag21oo53sd1
            PREFIX=g12weuw6n4h1cag21oo53sd1

            # в”Ђв”Ђ Clonar o actualizar cГіdigo в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if [ -d "$REPO_DIR/.git" ]; then
              cd $REPO_DIR && git fetch origin && git reset --hard origin/main
            else
              git clone https://github.com/alejandrochreyes2/outilotech-pedidos.git $REPO_DIR
              cd $REPO_DIR
            fi
            echo "вњ“ CГіdigo actualizado al commit $COMMIT"

            # в”Ђв”Ђ Aplicar pg_hba.conf si cambiГі в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if [ "$APPLY_INFRA" = "true" ]; then
              echo "в†’ Aplicando infra/postgres/pg_hba.conf..."
              PG_CONTAINER=$(docker ps --filter "name=${PREFIX}" --format "{{.Names}}" | grep postgres)
              docker cp $REPO_DIR/infra/postgres/pg_hba.conf $PG_CONTAINER:/var/lib/postgresql/data/pg_hba.conf
              docker exec $PG_CONTAINER psql -U root -d postgres -c "SELECT pg_reload_conf();" > /dev/null
              echo "вњ“ pg_hba.conf recargado"
            fi

            # в”Ђв”Ђ FunciГіn helper para build + restart в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            deploy_service() {
              SERVICE=$1
              BUILD_CONTEXT=$2
              IMAGE="${PREFIX}_${SERVICE}:${COMMIT}"

              echo "в†’ Construyendo ${SERVICE}..."
              docker build -t $IMAGE $REPO_DIR/$BUILD_CONTEXT

              # Actualizar tag en docker-compose.yaml
              OLD_TAG=$(grep "image:.*${PREFIX}_${SERVICE}:" $COMPOSE_DIR/docker-compose.yaml | grep -o "${SERVICE}:[a-f0-9]*" | head -1)
              sed -i "s|${PREFIX}_${SERVICE}:[a-f0-9]*|${PREFIX}_${SERVICE}:${COMMIT}|g" $COMPOSE_DIR/docker-compose.yaml

              echo "в†’ Reiniciando ${SERVICE}..."
              cd $COMPOSE_DIR && docker compose up -d --no-deps $SERVICE
              echo "вњ“ ${SERVICE} desplegado ($IMAGE)"
            }

            # в”Ђв”Ђ Construir y desplegar servicios modificados в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            cd $COMPOSE_DIR

            if [ "$BUILD_PEDIDOS" = "true" ]; then
              deploy_service "pedidos" "backend/pedidos"
            fi

            if [ "$BUILD_USUARIOS" = "true" ]; then
              deploy_service "usuarios" "backend/usuarios"
            fi

            if [ "$BUILD_PAGOS" = "true" ]; then
              deploy_service "pagos" "backend/pagos"
            fi

            if [ "$BUILD_GATEWAY" = "true" ]; then
              deploy_service "apigateway" "backend/ApiGateway"
            fi

            if [ "$BUILD_FRONTEND" = "true" ]; then
              echo "в†’ Construyendo frontend Angular..."
              docker build -t ${PREFIX}_frontend:${COMMIT} $REPO_DIR/frontend
              OLD=$(grep "image:.*${PREFIX}_frontend:" docker-compose.yaml | grep -o "frontend:[a-f0-9]*" | head -1)
              sed -i "s|${PREFIX}_frontend:[a-f0-9]*|${PREFIX}_frontend:${COMMIT}|g" docker-compose.yaml
              docker compose up -d --no-deps frontend
              echo "вњ“ Frontend desplegado"
            fi

            # в”Ђв”Ђ Limpiar imГЎgenes antiguas (guardar Гєltimas 3) в”Ђв”Ђв”Ђв”Ђв”Ђ
            for SVC in pedidos usuarios pagos apigateway frontend; do
              docker images "${PREFIX}_${SVC}" --format "{{.ID}} {{.Tag}}" \
                | sort -k2 -r | tail -n +4 \
                | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true
            done

            echo ""
            echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
            echo " Deploy completado вЂ” commit: $COMMIT"
            echo " $(date)"
            echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"

      # в”Ђв”Ђ Verificar salud del sistema в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            https://api.outiltech.co/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"jhonatanhtech@gmail.com","password":"Admin1327"}' \
            --max-time 15)
          echo "HTTP status login: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "вќЊ Health check fallГі (HTTP $STATUS)"
            exit 1
          fi
          echo "вњ… Sistema operativo вЂ” login OK"

name: Create DNS Record for api.outiltech.co
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Get Zone ID
        id: zone
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_DNS_TOKEN }}" ]; then
            echo "❌ ERROR: CLOUDFLARE_DNS_TOKEN is missing."
            exit 1
          fi
          
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=outiltech.co" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_DNS_TOKEN }}" \
               -H "Content-Type: application/json" | jq -r '.result[0].id')
          
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" == "null" ]; then
            echo "❌ ERROR: Zone not found."
            exit 1
          fi
          echo "ZONE_ID=$ZONE_ID" >> $GITHUB_OUTPUT
          
      - name: Check or Create/Update DNS Record
        run: |
          ZONE_ID=${{ steps.zone.outputs.ZONE_ID }}
          
          RECORD=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=api.outiltech.co" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_DNS_TOKEN }}" \
            -H "Content-Type: application/json")
            
          EXISTING_ID=$(echo $RECORD | jq -r '.result[0].id')
          EXISTING_IP=$(echo $RECORD | jq -r '.result[0].content')
          
          DATA='{"type":"A","name":"api.outiltech.co","content":"178.156.222.248","ttl":1,"proxied":true}'
          
          if [ "$EXISTING_ID" == "null" ] || [ -z "$EXISTING_ID" ]; then
            echo "➕ Creating new DNS record..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_DNS_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data "$DATA"
          elif [ "$EXISTING_IP" != "178.156.222.248" ]; then
            echo "🔄 Updating existing DNS record..."
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING_ID" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_DNS_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data "$DATA"
          else
            echo "✅ DNS record is already correct."
          fi

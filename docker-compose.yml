services:
  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - usuarios
      - pedidos
      - pagos

  # Microservicios

  usuarios:
    build: ./backend/usuarios
    ports:
      - "5250:3001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  pedidos:
    build: ./backend/pedidos
    ports:
      - "5210:3002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  pagos:
    build: ./backend/pagos
    ports:
      - "5056:3003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  # Base de datos simulada (MongoDB)
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

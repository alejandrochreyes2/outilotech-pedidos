version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: outiltech-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres2026}
      POSTGRES_DB: ${POSTGRES_DB:-outiltech}
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:6
    container_name: outiltech-mongodb-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-root}
    volumes:
      - mongodb-data-prod:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"

  usuarios:
    build:
      context: ./backend/usuarios
      dockerfile: Dockerfile
    container_name: outiltech-usuarios-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-outiltech};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-root}
      - Jwt__Issuer=${JWT_ISSUER:-OutilTech}
      - Jwt__Audience=${JWT_AUDIENCE:-OutilTechUsers}
      - Jwt__Key=${JWT_KEY:-YourSuperSecretKeyHere1234567890}
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "3001:8080"

  pedidos:
    build:
      context: ./backend/pedidos
      dockerfile: Dockerfile
    container_name: outiltech-pedidos-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-outiltech};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-root}
      - Jwt__Issuer=${JWT_ISSUER:-OutilTech}
      - Jwt__Audience=${JWT_AUDIENCE:-OutilTechUsers}
      - Jwt__Key=${JWT_KEY:-YourSuperSecretKeyHere1234567890}
      - Wompi__PublicKey=pub_prod_KvfEtrlz3o4BUKuiSvYufUMqFYW8h5GK
      - Wompi__IntegrityKey=prod_integrity_zsCbzReUepnjB5ZbLZnEpk4v8VjrGvK5
      - Wompi__EventsKey=prod_events_XalS3k82LklSfv6Q0mG5y1kt0VsfkNXx
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "3002:8080"

  pagos:
    build:
      context: ./backend/pagos
      dockerfile: Dockerfile
    container_name: outiltech-pagos-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-outiltech};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-root}
      - Jwt__Issuer=${JWT_ISSUER:-OutilTech}
      - Jwt__Audience=${JWT_AUDIENCE:-OutilTechUsers}
      - Jwt__Key=${JWT_KEY:-YourSuperSecretKeyHere1234567890}
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "3003:8080"

  apigateway:
    build:
      context: ./backend/ApiGateway
      dockerfile: Dockerfile
    container_name: outiltech-apigateway-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Issuer=${JWT_ISSUER:-OutilTech}
      - Jwt__Audience=${JWT_AUDIENCE:-OutilTechUsers}
      - Jwt__Key=${JWT_KEY:-YourSuperSecretKeyHere1234567890}
    depends_on:
      - usuarios
      - pedidos
      - pagos
    restart: unless-stopped
    ports:
      - "5000:5000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.apigateway.rule=Host(`api.outiltech.co`) || Host(`api.178-156-222-248.sslip.io`)
      - traefik.http.routers.apigateway.entrypoints=https
      - traefik.http.routers.apigateway.tls=true
      - traefik.http.routers.apigateway.tls.certresolver=letsencrypt
      - traefik.http.services.apigateway.loadbalancer.server.port=5000


  portafolio:
    build:
      context: ./portafolio
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=https://nvwiuxtvcoputzeoouqc.supabase.co
        - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52d2l1eHR2Y29wdXR6ZW9vdXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDUxNjUsImV4cCI6MjA5MTI4MTE2NX0.xomcxJiJFq68kvDtypFMCMEDyvEnl4ycK_i4KDlI2bU
    container_name: outiltech-portafolio-prod
    restart: unless-stopped
    ports:
      - "3010:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.portafolio.rule=Host(`dev.outiltech.co`) || Host(`dev.178-156-222-248.sslip.io`)
      - traefik.http.routers.portafolio.entrypoints=https
      - traefik.http.routers.portafolio.tls=true
      - traefik.http.routers.portafolio.tls.certresolver=letsencrypt
      - traefik.http.services.portafolio.loadbalancer.server.port=80

volumes:
  postgres-data-prod:
  mongodb-data-prod:
